
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechWingsys Student Project Tracker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            background:#f4f7fc;
            font-family:"Segoe UI",sans-serif;
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }

        /* Navbar */
        .navbar{
            background:linear-gradient(90deg,#0f172a,#1e3a8a);
            box-shadow:0 3px 15px rgba(0,0,0,.15);
            padding:12px 0;
        }

        .navbar-brand{
            font-size:1.4rem;
            font-weight:700;
            color:#fff !important;
        }

        .nav-btn{
            background:#fff;
            color:#1e3a8a !important;
            border-radius:30px;
            padding:8px 18px;
            font-weight:600;
            text-decoration:none;
            transition:.3s;
            display:inline-flex;
            align-items:center;
            gap:6px;
        }

        .nav-btn:hover{
            background:#2563eb;
            color:#fff !important;
        }

        /* Main content */
        .content-wrapper{
            flex:1;
        }

        .main-card{
            background:#fff;
            border-radius:18px;
            margin-top:25px;
            margin-bottom:25px;
            padding:30px;
            box-shadow:0 8px 30px rgba(0,0,0,.08);
        }

        /* Cards */
        .card{
            border:none;
            border-radius:16px;
            box-shadow:0 4px 15px rgba(0,0,0,.08);
        }

        /* Buttons */
        .btn{
            border-radius:10px;
        }

        /* Tables */
        .table-responsive{
            overflow-x:auto;
        }

        /* Images */
        img{
            max-width:100%;
            height:auto;
        }

        footer{
            text-align:center;
            padding:18px;
            color:#6b7280;
            font-size:.9rem;
            background:#fff;
            border-top:1px solid #e5e7eb;
        }

        /* Tablet */
        @media (max-width: 768px){

            .navbar-brand{
                font-size:1.2rem;
            }

            .main-card{
                padding:20px;
                margin-top:15px;
            }

            h1{font-size:2rem;}
            h2{font-size:1.6rem;}
            h3{font-size:1.3rem;}

            .nav-btn{
                padding:7px 14px;
                font-size:.9rem;
            }
        }

        /* Mobile */
        @media (max-width: 576px){

            .navbar .container{
                display:flex;
                flex-direction:column;
                gap:12px;
                align-items:center;
            }

            .navbar-brand{
                text-align:center;
            }

            .main-card{
                padding:15px;
                border-radius:12px;
            }

            .nav-btn{
                width:100%;
                justify-content:center;
            }

            .btn{
                width:100%;
                margin-bottom:8px;
            }

            table{
                font-size:.9rem;
            }

            footer{
                font-size:.8rem;
            }
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="container d-flex justify-content-between align-items-center flex-wrap">

        <a class="navbar-brand" href="/">
            <i class="bi bi-mortarboard-fill"></i>
            TechWingsys Student Tracker
        </a>

        <div class="d-flex gap-2 flex-wrap justify-content-center">
            <a href="/dashboard/" class="nav-btn">
                <i class="bi bi-speedometer2"></i>
                Dashboard
            </a>
        </div>

    </div>
</nav>

<div class="content-wrapper">
    <div class="container">
        <div class="main-card">

            {% block content %}
            {% endblock %}

        </div>
    </div>
</div>

<footer>
    © 2026 TechWingsys Student Tracker. All Rights Reserved.
</footer>

</body>
</html>
