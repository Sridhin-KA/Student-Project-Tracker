<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechWing Student Tracker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7fc;
            font-family: "Segoe UI", sans-serif;
        }

        /* Navbar */
        .navbar{
            background: linear-gradient(90deg,#0f172a,#1e3a8a);
            box-shadow:0 3px 15px rgba(0,0,0,.15);
        }

        .navbar-brand{
            font-size:24px;
            font-weight:700;
            color:#fff !important;
        }

        .nav-btn{
            background:#ffffff;
            color:#1e3a8a !important;
            border-radius:30px;
            padding:8px 18px;
            font-weight:600;
            text-decoration:none;
            margin-left:8px;
            transition:.3s;
        }

        .nav-btn:hover{
            background:#2563eb;
            color:#fff !important;
        }

        /* Main container */
        .main-card{
            background:#fff;
            padding:30px;
            border-radius:18px;
            margin-top:30px;
            box-shadow:0 8px 30px rgba(0,0,0,.08);
        }

        /* Buttons */
        .btn-primary{
            background:#2563eb;
            border:none;
        }

        .btn-primary:hover{
            background:#1d4ed8;
        }

        .btn-success{
            background:#10b981;
            border:none;
        }

        .btn-success:hover{
            background:#059669;
        }

        .btn-danger{
            border:none;
        }

        /* Tables */
        .table{
            border-radius:12px;
            overflow:hidden;
        }

        .table thead{
            background:#1e3a8a;
            color:white;
        }

        /* Cards */
        .card{
            border:none;
            border-radius:16px;
            transition:.3s;
            box-shadow:0 4px 15px rgba(0,0,0,.08);
        }

        .card:hover{
            transform:translateY(-5px);
        }

        /* Headings */
        h1,h2,h3,h4,h5{
            color:#0f172a;
            font-weight:700;
        }

        a{
            text-decoration:none;
        }

        footer{
            margin-top:60px;
            text-align:center;
            color:#6b7280;
            padding:20px;
            font-size:14px;
        }
    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand" href="/">
            <i class="bi bi-mortarboard-fill"></i>
            Student Tracker
        </a>

        <div>
         

            <a href="/dashboard/" class="nav-btn">
                <i class="bi bi-speedometer2"></i>
                Dashboard
            </a>
        </div>

    </div>
</nav>

<div class="container">
    <div class="main-card">

        {% block content %}
        {% endblock %}

    </div>
</div>

<footer>
    © 2026 TechWing Student Tracker
</footer>

</body>
</html>
