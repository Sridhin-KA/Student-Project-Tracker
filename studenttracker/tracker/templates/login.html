{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center align-items-center px-2 px-sm-3" style="min-height: 80vh;">
    <div class="col-11 col-sm-8 col-md-7 col-lg-5 col-xl-4">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-body p-4 p-sm-5">

                <div class="text-center mb-4">
                    <div
                        class="mx-auto mb-3 d-flex align-items-center justify-content-center"
                        style="
                            width: 85px;
                            height: 85px;
                            border-radius: 50%;
                            background: linear-gradient(135deg, #2563eb, #1e40af);
                            color: white;
                            font-size: 2.5rem;
                            box-shadow: 0 10px 20px rgba(37,99,235,0.25);
                        "
                    >
                        🔐
                    </div>

                    <h2 class="fw-bold text-primary fs-2 fs-md-1">
                        Admin Login
                    </h2>

                    <p class="text-muted small mb-0">
                        Sign in to manage batches, students, and project links.
                    </p>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label fw-semibold mb-2">
                            <i class="bi bi-person-circle me-1"></i> Username
                        </label>
                        <input
                            type="text"
                            name="username"
                            class="form-control form-control-lg rounded-3"
                            placeholder="Enter username"
                            required
                            autofocus
                        >
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold mb-2">
                            <i class="bi bi-lock-fill me-1"></i> Password
                        </label>
                        <input
                            type="password"
                            name="password"
                            class="form-control form-control-lg rounded-3"
                            placeholder="Enter password"
                            required
                        >
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button
                            type="submit"
                            class="btn btn-primary btn-lg rounded-pill py-2"
                        >
                            <i class="bi bi-box-arrow-in-right me-1"></i> Login
                        </button>
                    </div>
                </form>

                <!-- Optional: password reset hint (can be removed) -->
                <div class="text-center mt-3">
                    <small class="text-muted">
                        <i class="bi bi-info-circle"></i> Demo: admin / admin123
                    </small>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Extra responsive fine-tuning -->
<style>
    @media (max-width: 576px) {
        .card-body {
            padding: 1.5rem !important;
        }
        .btn-lg {
            font-size: 1rem;
            padding: 0.6rem 1rem;
        }
        .form-control-lg {
            font-size: 0.95rem;
            padding: 0.6rem 0.85rem;
        }
        .display-icon {
            width: 70px;
            height: 70px;
            font-size: 2rem;
        }
    }
</style>

{% endblock %}
